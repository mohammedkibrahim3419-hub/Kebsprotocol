<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kebs Protocol</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0f1e;color:#e0e6f0;font-family:monospace}header{background:#0d1530;border-bottom:1px solid #1e3a5f;padding:16px 24px}header h1{color:#4fc3f7;letter-spacing:2px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px}.card{background:#0d1530;border:1px solid #1e3a5f;border-radius:12px;padding:20px}.card h2{font-size:13px;color:#4fc3f7;margin-bottom:16px;text-transform:uppercase}.stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #0f2040;font-size:13px}.val{color:#81d4fa;font-weight:bold}.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:bold;margin:4px}.btn-start{background:#1b5e20;color:#69f0ae}.btn-stop{background:#b71c1c;color:#ff8a80}.btn-refresh{background:#1a3a5c;color:#4fc3f7}.log-box{background:#060d1a;border:1px solid #1e3a5f;border-radius:8px;padding:12px;height:200px;overflow-y:auto;font-size:11px;line-height:1.8}@media(max-width:600px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>KEBS PROTOCOL</h1></header><div class="grid"><div class="card"><h2>Agent Wallet</h2><div class="stat"><span>Address</span><span class="val" id="addr">-</span></div><div class="stat"><span>ARC</span><span class="val" id="arc">-</span></div><div class="stat"><span>USDC</span><span class="val" id="usdc">-</span></div></div><div class="card"><h2>Control</h2><div class="stat"><span>Status</span><span class="val" id="status">Offline</span></div><br><button class="btn btn-start" onclick="start()">START</button><button class="btn btn-stop" onclick="stop()">STOP</button><button class="btn btn-refresh" onclick="refresh()">REFRESH</button></div><div class="card" style="grid-column:1/-1"><h2>Logs</h2><div class="log-box" id="logs"></div></div></div><script>async function fetchW(){try{const r=await fetch("/agent/wallet");const d=await r.json();document.getElementById("addr").textContent=d.address?d.address.slice(0,10)+"..."+d.address.slice(-6):"-";document.getElementById("arc").textContent=(parseFloat(d.native)||0).toFixed(4)+" ARC";document.getElementById("usdc").textContent=(parseFloat(d.usdc)||0).toFixed(2)+" USDC";}catch(e){}}async function fetchS(){try{const r=await fetch("/agent/status");const d=await r.json();document.getElementById("status").textContent=d.running?"Running":"Stopped";const b=document.getElementById("logs");b.innerHTML=(d.logs||[]).map(l=>"<div style=color:#64b5f6>"+l.time.slice(11,19)+" "+l.msg+"</div>").join("");b.scrollTop=b.scrollHeight;}catch(e){}}async function start(){await fetch("/agent/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({interval:60000})});refresh();}async function stop(){await fetch("/agent/stop",{method:"POST"});refresh();}function refresh(){fetchW();fetchS();}refresh();setInterval(refresh,10000);</script></body></html>
