<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kebs Protocol</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f1e; color: #e0e6f0; font-family: 'Courier New', monospace; }
  header { background: #0d1530; border-bottom: 1px solid #1e3a5f; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; color: #4fc3f7; letter-spacing: 2px; }
  .badge { background: #1a3a5c; color: #4fc3f7; padding: 2px 10px; border-radius: 20px; font-size: 11px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; }
  .card { background: #0d1530; border: 1px solid #1e3a5f; border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 13px; color: #4fc3f7; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
  .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #0f2040; font-size: 13px; }
  .stat:last-child { border-bottom: none; }
  .val { color: #81d4fa; font-weight: bold; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold; margin: 4px; }
  .btn-start { background: #1b5e20; color: #69f0ae; }
  .btn-stop { background: #b71c1c; color: #ff8a80; }
  .btn-refresh { background: #1a3a5c; color: #4fc3f7; }
  .btn-mm { background: #f6851b; color: #fff; display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold; }
  .btn-mm img { width: 20px; height: 20px; }
  .btn-disconnect { background: #37474f; color: #cfd8dc; }
  .log-box { background: #060d1a; border: 1px solid #1e3a5f; border-radius: 8px; padding: 12px; height: 200px; overflow-y: auto; font-size: 11px; line-height: 1.8; }
  .connected { color: #69f0ae; }
  .disconnected { color: #ff8a80; }
  .mm-card { grid-column: 1/-1; }
  .mm-info { display: flex; flex-direction: column; gap: 8px; }
  .mm-addr { font-size: 12px; color: #4fc3f7; word-break: break-all; }
  .mm-bal { font-size: 14px; color: #69f0ae; font-weight: bold; }
  .mm-network { font-size: 12px; color: #81d4fa; }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .send-form { margin-top: 12px; display: none; }
  .send-form input { background: #0a0f1e; border: 1px solid #1e3a5f; color: #e0e6f0; padding: 8px 12px; border-radius: 8px; font-family: inherit; font-size: 12px; width: 100%; margin-bottom: 8px; }
  .btn-send { background: #1a5276; color: #85c1e9; width: 100%; }
  .tx-result { margin-top: 8px; font-size: 11px; color: #69f0ae; word-break: break-all; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>⬡ KEBS PROTOCOL</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <span class="badge">Arc Testnet</span>
    <span class="badge" id="statusBadge">OFFLINE</span>
  </div>
</header>
<div class="grid">

  <!-- MetaMask Card -->
  <div class="card mm-card">
    <h2>🦊 MetaMask Wallet</h2>
    <div id="mmDisconnected">
      <p style="font-size:13px;color:#546e7a;margin-bottom:12px;">Connect your wallet to send USDC and interact with Kebs Protocol</p>
      <button class="btn-mm" onclick="connectMM()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" onerror="this.style.display='none'"/>
        Connect MetaMask
      </button>
    </div>
    <div id="mmConnected" style="display:none;">
      <div class="mm-info">
        <div class="stat"><span>Address</span><span class="val mm-addr" id="mmAddr">-</span></div>
        <div class="stat"><span>Network</span><span class="val mm-network" id="mmNetwork">-</span></div>
        <div class="stat"><span>Balance</span><span class="val mm-bal" id="mmBal">-</span></div>
      </div>
      <div class="btns">
        <button class="btn btn-mm" onclick="addArcNetwork()">Add Arc Testnet</button>
        <button class="btn btn-disconnect" onclick="disconnectMM()">Disconnect</button>
        <button class="btn btn-send" onclick="toggleSend()">Send USDC</button>
      </div>
      <div class="send-form" id="sendForm">
        <input id="sendTo" placeholder="Recipient address (0x...)"/>
        <input id="sendAmount" placeholder="Amount in USDC" type="number"/>
        <button class="btn btn-send" onclick="sendUSDC()">Send</button>
        <div class="tx-result" id="txResult"></div>
      </div>
    </div>
  </div>

  <!-- Agent Wallet -->
  <div class="card">
    <h2>Agent Wallet</h2>
    <div class="stat"><span>Address</span><span class="val" id="addr">-</span></div>
    <div class="stat"><span>ARC</span><span class="val" id="arc">-</span></div>
    <div class="stat"><span>USDC</span><span class="val" id="usdc">-</span></div>
  </div>

  <!-- Control -->
  <div class="card">
    <h2>Agent Control</h2>
    <div class="stat"><span>Status</span><span class="val" id="status">Offline</span></div>
    <div class="stat"><span>Network</span><span class="val">Arc Testnet</span></div>
    <div class="btns">
      <button class="btn btn-start" onclick="start()">START</button>
      <button class="btn btn-stop" onclick="stop()">STOP</button>
      <button class="btn btn-refresh" onclick="refresh()">REFRESH</button>
    </div>
  </div>

  <!-- Logs -->
  <div class="card" style="grid-column:1/-1;">
    <h2>Agent Logs</h2>
    <div class="log-box" id="logs"></div>
  </div>

</div>

<script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
<script>
let mmProvider = null;
let mmSigner = null;
let mmAddress = null;

// MetaMask Connect
async function connectMM() {
  if (typeof window.ethereum === 'undefined') {
    alert('MetaMask not found! Install MetaMask browser extension or use MetaMask mobile browser.');
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    mmAddress = accounts[0];
    mmProvider = new ethers.providers.Web3Provider(window.ethereum);
    mmSigner = mmProvider.getSigner();
    await updateMMUI();
    window.ethereum.on('accountsChanged', async (accounts) => {
      mmAddress = accounts[0];
      await updateMMUI();
    });
    window.ethereum.on('chainChanged', async () => {
      mmProvider = new ethers.providers.Web3Provider(window.ethereum);
      mmSigner = mmProvider.getSigner();
      await updateMMUI();
    });
  } catch(e) {
    alert('Connection failed: ' + e.message);
  }
}

async function updateMMUI() {
  if (!mmAddress) return;
  document.getElementById('mmDisconnected').style.display = 'none';
  document.getElementById('mmConnected').style.display = 'block';
  document.getElementById('mmAddr').textContent = mmAddress.slice(0,8)+'...'+mmAddress.slice(-6);
  const network = await mmProvider.getNetwork();
  document.getElementById('mmNetwork').textContent = network.name + ' ('+network.chainId+')';
  const bal = await mmProvider.getBalance(mmAddress);
  document.getElementById('mmBal').textContent = parseFloat(ethers.utils.formatEther(bal)).toFixed(4) + ' ETH';
}

async function addArcNetwork() {
  try {
    await window.ethereum.request({
      method: 'wallet_addEthereumChain',
      params: [{
        chainId: '0x4DC',
        chainName: 'Arc Testnet',
        nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
        rpcUrls: ['https://arc-testnet.drpc.org'],
        blockExplorerUrls: ['https://explorer.testnet.arc.network']
      }]
    });
    alert('Arc Testnet added to MetaMask!');
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function disconnectMM() {
  mmAddress = null;
  mmProvider = null;
  mmSigner = null;
  document.getElementById('mmDisconnected').style.display = 'block';
  document.getElementById('mmConnected').style.display = 'none';
}

function toggleSend() {
  const f = document.getElementById('sendForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function sendUSDC() {
  const to = document.getElementById('sendTo').value;
  const amount = document.getElementById('sendAmount').value;
  const result = document.getElementById('txResult');
  if (!to || !amount) { result.textContent = 'Fill in address and amount'; return; }
  try {
    result.textContent = 'Sending...';
    const usdcAddress = '0x3600000000000000000000000000000000000000';
    const abi = ['function transfer(address to, uint256 amount) returns (bool)', 'function decimals() view returns (uint8)'];
    const usdc = new ethers.Contract(usdcAddress, abi, mmSigner);
    const decimals = await usdc.decimals();
    const parsed = ethers.utils.parseUnits(amount, decimals);
    const tx = await usdc.transfer(to, parsed);
    result.textContent = 'Waiting for confirmation...';
    await tx.wait();
    result.textContent = 'Sent! TX: ' + tx.hash;
  } catch(e) {
    result.textContent = 'Error: ' + e.message;
  }
}

// Agent functions
async function fetchW() {
  try {
    const r = await fetch('/agent/wallet');
    const d = await r.json();
    document.getElementById('addr').textContent = d.address ? d.address.slice(0,8)+'...'+d.address.slice(-6) : '-';
    document.getElementById('arc').textContent = (parseFloat(d.native)||0).toFixed(4)+' ARC';
    document.getElementById('usdc').textContent = (parseFloat(d.usdc)||0).toFixed(2)+' USDC';
  } catch(e) {}
}

async function fetchS() {
  try {
    const r = await fetch('/agent/status');
    const d = await r.json();
    document.getElementById('status').textContent = d.running ? 'Running' : 'Stopped';
    document.getElementById('statusBadge').textContent = d.running ? 'ONLINE' : 'OFFLINE';
    const b = document.getElementById('logs');
    b.innerHTML = (d.logs||[]).map(l=>`<div style="color:#64b5f6">${l.time.slice(11,19)} ${l.msg}</div>`).join('');
    b.scrollTop = b.scrollHeight;
  } catch(e) {}
}

async function start() { await fetch('/agent/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({interval:60000})}); refresh(); }
async function stop() { await fetch('/agent/stop',{method:'POST'}); refresh(); }
function refresh() { fetchW(); fetchS(); }

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
